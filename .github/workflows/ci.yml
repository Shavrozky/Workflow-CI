name: MLflow CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.10.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.10.13"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Clean old MLflow runs
        run: |
          rm -rf mlruns
          rm -rf MLProject/mlruns

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn cloudpickle

      - name: Run mlflow project
        run: |
          mlflow run MLProject --env-manager=local --experiment-name "Credit Scoring CI Experiment"

      - name: Check MLflow artifacts
        run: |
          echo "Isi folder mlruns:"
          find mlruns -maxdepth 5 -type f || true

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/

      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(find mlruns -mindepth 2 -maxdepth 2 -type d | grep -v ".trash" | xargs ls -td | head -n 1 | xargs basename)
          echo "MLFLOW_RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run id: $RUN_ID"

      - name: Check selected model environment
        run: |
          echo "Selected run id: ${{ env.MLFLOW_RUN_ID }}"
          find mlruns -path "*/${{ env.MLFLOW_RUN_ID }}/artifacts/model/*" -maxdepth 10 -type f -print
          echo "python_env.yaml:"
          cat mlruns/*/${{ env.MLFLOW_RUN_ID }}/artifacts/model/python_env.yaml || true
          echo "conda.yaml:"
          cat mlruns/*/${{ env.MLFLOW_RUN_ID }}/artifacts/model/conda.yaml || true

      - name: Build Docker Model
        run: |
          mlflow models build-docker -m "runs:/${{ env.MLFLOW_RUN_ID }}/model" -n credit-scoring-model --env-manager=local

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag credit-scoring-model ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest
